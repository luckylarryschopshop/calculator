<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Calculator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0d1117;
      color: #e6edf3;
      display: flex;
      height: 100vh;
    }
    .container {
      display: flex;
      width: 100%;
      max-width: 600px;
      margin: auto;
      flex-direction: column;
    }
    .display {
      background: #1a1f26;
      padding: 20px;
      text-align: right;
      font-size: 24px;
      border-bottom: 1px solid #2d333d;
    }
    .history {
      background: #1a1f26;
      padding: 10px;
      font-size: 14px;
      overflow-y: auto;
      max-height: 200px;
      border-bottom: 1px solid #2d333d;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 10px;
    }
    button {
      background: #1e232d;
      color: #e6edf3;
      border: none;
      padding: 20px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 5px;
      transition: background 0.2s;
    }
    button:hover {
      background: #2d333d;
    }
    button.operator {
      background: #f97316;
      color: #0d1117;
    }
    button.operator:hover {
      background: #d97706;
    }
    .history-item {
      margin-bottom: 5px;
    }
    @media (max-width: 600px) {
      .buttons {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="display" id="display">0</div>
    <div class="history" id="history"></div>
    <div class="buttons">
      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button onclick="append('/')">/</button>
      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button onclick="append('*')">*</button>
      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button onclick="append('-')">-</button>
      <button onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button onclick="calculate()">=</button>
      <button onclick="clearDisplay()">C</button>
      <button onclick="backspace()">⌫</button>
    </div>
  </div>
  <script>
    const display = document.getElementById('display');
    const history = document.getElementById('history');
    let currentInput = '0';
    let previousInput = '';
    let operation = null;

    function updateDisplay() {
      display.textContent = currentInput;
    }

    function append(value) {
      if (currentInput === '0') currentInput = '';
      currentInput += value;
      updateDisplay();
    }

    function clearDisplay() {
      currentInput = '0';
      previousInput = '';
      operation = null;
      updateDisplay();
    }

    function backspace() {
      currentInput = currentInput.slice(0, -1) || '0';
      updateDisplay();
    }

    function chooseOperation(op) {
      if (previousInput === '') {
        previousInput = currentInput;
        operation = op;
        currentInput = '';
      }
    }

    function calculate() {
      if (previousInput === '' || currentInput === '' || !operation) return;
      let result;
      const prev = parseFloat(previousInput);
      const curr = parseFloat(currentInput);
      switch (operation) {
        case '+': result = prev + curr; break;
        case '-': result = prev - curr; break;
        case '*': result = prev * curr; break;
        case '/': 
          if (curr === 0) {
            display.textContent = 'Error: Divide by zero';
            return;
          }
          result = prev / curr; break;
        default: return;
      }
      const historyItem = `${previousInput} ${operation} ${currentInput} = ${result}`;
      saveHistory(historyItem);
      currentInput = result.toString();
      previousInput = '';
      operation = null;
      updateDisplay();
    }

    function saveHistory(item) {
      const historyItems = JSON.parse(localStorage.getItem('calculatorHistory') || '[]');
      historyItems.unshift(item);
      if (historyItems.length > 20) historyItems.pop();
      localStorage.setItem('calculatorHistory', JSON.stringify(historyItems));
      renderHistory();
    }

    function renderHistory() {
      const historyItems = JSON.parse(localStorage.getItem('calculatorHistory') || '[]');
      history.innerHTML = '';
      if (historyItems.length === 0) {
        history.innerHTML = '<div class="history-item">No history yet.</div>';
      } else {
        historyItems.forEach(item => {
          const div = document.createElement('div');
          div.className = 'history-item';
          div.textContent = item;
          history.appendChild(div);
        });
      }
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key;
      if (/^[0-9]$/.test(key)) append(key);
      if (['+', '-', '*', '/'].includes(key)) chooseOperation(key);
      if (key === 'Enter') calculate();
      if (key === 'Backspace') backspace();
      if (key === 'c' || key === 'C') clearDisplay();
    });

    updateDisplay();
    renderHistory();
  </script>
</body>
</html>
